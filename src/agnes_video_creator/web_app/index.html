<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Agnes Video Creator</title>
<style>
:root {
  --bg:#0d0d0d;--surface:#161616;--surface2:#1e1e1e;--surface3:#282828;
  --border:#2a2a2a;--text:#e0e0e0;--text2:#999;--text3:#666;
  --accent:#6c6;--accent2:#4a4;--blue:#58a6ff;--red:#f85149;
  --yellow:#d29922;--purple:#a371f7;--radius:8px;
  --font:-apple-system,"Noto Sans CJK SC","Microsoft YaHei","PingFang SC",sans-serif;
  --mono:"JetBrains Mono","Fira Code","Cascadia Code",monospace;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{font-size:14px}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh}
a{color:var(--blue);text-decoration:none}
a:hover{text-decoration:underline}

.navbar{display:flex;align-items:center;gap:12px;padding:12px 24px;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100}
.navbar .brand{font-weight:700;font-size:1.1em;color:var(--accent);letter-spacing:.5px}
.navbar .brand-sub{color:var(--text3);font-size:.85em}
.navbar .spacer{flex:1}
.navbar .dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--text3)}
.navbar .dot.on{background:var(--accent);box-shadow:0 0 6px var(--accent)}
.container{max-width:1400px;margin:0 auto;padding:20px 24px}

.page-title{font-size:1.4em;font-weight:600;margin-bottom:6px}
.page-sub{color:var(--text2);margin-bottom:20px;font-size:.9em}

.project-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px}
.project-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px;cursor:pointer;transition:border-color .15s,transform .1s}
.project-card:hover{border-color:var(--accent);transform:translateY(-2px)}
.project-card h3{font-size:1.05em;margin-bottom:4px}
.project-card .meta{color:var(--text3);font-size:.85em;margin-bottom:10px}
.project-card .stats{display:flex;gap:8px;flex-wrap:wrap}
.stat-badge{font-size:.8em;padding:2px 10px;border-radius:10px;background:var(--surface3);color:var(--text2)}
.stat-badge.assembled{background:#0a2a0a;color:var(--accent)}
.stat-badge.pending{background:#2a1a0a;color:var(--yellow)}
.stat-badge.script_ready{background:#0a1a2a;color:var(--blue)}
.stat-badge.images_ready{background:#1a0a2a;color:var(--purple)}
.stat-badge.videos_ready{background:#0a2a2a;color:#4dd}
.stat-badge.completed{background:#0a2a0a;color:var(--accent)}
.stat-badge.failed{background:#2a0a0a;color:var(--red)}
.stat-badge.running{background:#0a1a2a;color:var(--blue)}
.stat-badge.cancelled{background:#2a1a0a;color:var(--text3)}
.empty-state{text-align:center;padding:60px 20px;color:var(--text3)}
.empty-state p{margin-bottom:12px}

.project-header{display:flex;align-items:flex-start;gap:16px;margin-bottom:24px}
.project-header .back{font-size:.9em;padding-top:4px}
.project-header .info{flex:1}
.project-header h1{font-size:1.5em}
.project-header .meta{color:var(--text3);font-size:.85em;margin-top:2px}

.two-col{display:flex;gap:20px;align-items:flex-start}
.two-col .main{flex:1;min-width:0}
.two-col .side{width:380px;flex-shrink:0;position:sticky;top:80px}

.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:16px}
.card h2{font-size:1.05em;font-weight:600;margin-bottom:12px;color:var(--text)}
.card .empty{color:var(--text3);font-size:.9em;padding:8px 0}

.ep-table{width:100%;border-collapse:collapse}
.ep-table th{text-align:left;font-size:.8em;color:var(--text3);padding:6px 8px;border-bottom:1px solid var(--border)}
.ep-table td{padding:8px;border-bottom:1px solid var(--border);font-size:.9em}
.ep-table tr:hover td{background:var(--surface2)}
.ep-table tr{cursor:pointer}
.status-tag{display:inline-block;font-size:.75em;padding:2px 8px;border-radius:4px;font-weight:600}
.status-tag.assembled{background:#0a2a0a;color:var(--accent)}
.status-tag.pending{background:#2a1a0a;color:var(--yellow)}
.status-tag.script_ready{background:#0a1a2a;color:var(--blue)}
.status-tag.images_ready{background:#1a0a2a;color:var(--purple)}
.status-tag.videos_ready{background:#0a2a2a;color:#4dd}

.controls{display:flex;gap:8px;flex-wrap:wrap}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:6px;border:none;font-size:.85em;font-weight:500;cursor:pointer;transition:opacity .15s,transform .1s;font-family:var(--font)}
.btn:active{transform:scale(.97)}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none}
.btn-primary{background:var(--accent2);color:#000}
.btn-primary:hover:not(:disabled){background:var(--accent)}
.btn-danger{background:var(--red);color:#fff}
.btn-danger:hover:not(:disabled){opacity:.85}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--text)}
.btn-outline:hover:not(:disabled){border-color:var(--text2)}
.btn-small{padding:4px 10px;font-size:.8em}

.log-viewer{background:#000;border:1px solid var(--border);border-radius:var(--radius);padding:12px;font-family:var(--mono);font-size:.8em;line-height:1.5;height:320px;overflow-y:auto;white-space:pre-wrap;color:#ccc}
.log-viewer .ok{color:var(--accent)}
.log-viewer .warn{color:var(--yellow)}
.log-viewer .err{color:var(--red)}
.log-viewer .hl{color:var(--blue)}
.log-viewer .cursor::after{content:"\258A";animation:blink 1s step-end infinite;color:var(--accent)}
@keyframes blink{50%{opacity:0}}

.char-list{display:flex;flex-direction:column;gap:6px}
.char-item{display:flex;align-items:center;gap:8px;padding:6px 8px;background:var(--surface2);border-radius:4px;font-size:.85em}
.char-item .name{font-weight:600}
.char-item .role{color:var(--text3);font-size:.9em}
.char-item .voice{color:var(--text3);margin-left:auto;font-size:.85em}

.scene-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:14px}
.scene-card{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;transition:border-color .15s}
.scene-card:hover{border-color:var(--text3)}
.scene-card .img-wrap{width:100%;aspect-ratio:16/9;background:#111;display:flex;align-items:center;justify-content:center;overflow:hidden}
.scene-card .img-wrap img{width:100%;height:100%;object-fit:cover}
.scene-card .img-wrap .ph{color:var(--text3);font-size:.85em;text-align:center;padding:20px}
.scene-card .body{padding:10px 12px}
.scene-card .num{font-size:.75em;font-weight:600;color:var(--text3);margin-bottom:4px}
.scene-card .meta{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:6px}
.scene-card .badge{font-size:.7em;padding:2px 6px;border-radius:3px;background:var(--surface3);color:var(--text2)}
.scene-card .badge.cam{background:#1a3a2a;color:var(--accent)}
.scene-card .narr{font-size:.85em;line-height:1.4;color:var(--text);margin-bottom:4px}
.scene-card .dial{font-size:.8em;color:#b0b0ff;margin-top:2px}
.scene-card .dial .cn{font-weight:600;color:#8af}
.scene-card .tags{display:flex;gap:3px;flex-wrap:wrap;margin-top:4px}
.scene-card .tag{font-size:.7em;padding:1px 5px;border-radius:3px;background:#2a2a4a;color:#aac}
.scene-card .si{display:inline-flex;align-items:center;gap:4px;font-size:.75em;margin-top:6px}
.scene-card .si .d{width:6px;height:6px;border-radius:50%}
.scene-card .si .d.ok{background:var(--accent)}
.scene-card .si .d.no{background:var(--text3)}
.scene-card.dragging{opacity:.4}
.scene-card.drag-over{border-color:var(--accent)!important;box-shadow:0 0 0 2px var(--accent)}

.ep-header{margin-bottom:20px}
.ep-header h2{font-size:1.2em;font-weight:600}
.ep-header .il{display:flex;gap:12px;align-items:center;color:var(--text2);font-size:.9em;margin-top:4px}

.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;z-index:1000}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:24px;max-width:480px;width:90%}
.modal h2{font-size:1.1em;margin-bottom:16px}
.modal label{display:block;font-size:.85em;color:var(--text2);margin-bottom:4px}
.modal input,.modal select{width:100%;padding:8px 10px;margin-bottom:12px;background:var(--surface2);border:1px solid var(--border);border-radius:4px;color:var(--text);font-size:.9em;font-family:var(--font)}
.modal .acts{display:flex;gap:8px;justify-content:flex-end;margin-top:8px}

.flex{display:flex}.gap-2{gap:8px}.items-center{align-items:center}
.mt-2{margin-top:8px}.mb-2{margin-bottom:8px}
.text-sm{font-size:.85em}.text-xs{font-size:.75em}.text-muted{color:var(--text3)}
.truncate{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.hidden{display:none!important}
.pulse{animation:pulse 1.5s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}

@media(max-width:768px){
  .two-col{flex-direction:column}
  .two-col .side{width:100%;position:static}
  .project-grid{grid-template-columns:1fr}
  .scene-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>
<nav class="navbar">
  <a href="#/" class="brand">agnes-video</a>
  <span class="brand-sub">creator</span>
  <span class="spacer"></span>
  <a href="#/batch" style="font-size:.85em;color:var(--text2);margin-right:12px">Batch</a>
  <span class="dot on" title="Connected"></span>
</nav>
<div id="key-banner" class="hidden" style="background:var(--red);color:#fff;text-align:center;padding:6px 16px;font-size:.85em">
  ⚠ AGNES_API_KEY not set. Set it before using check, analyze, or render features.
</div>
<div class="container" id="app"></div>

<script>
const App = {
  _poller: null,
  async init(){
    window.addEventListener("hashchange",()=>this.route());
    try{
      const s=await this.api("/api/status");
      const b=document.getElementById("key-banner");
      if(b&&!s.api_key_configured)b.classList.remove("hidden");
    }catch(e){}
    this.route()
  },

  route(){
    const h=location.hash.slice(1)||"/";
    if(h==="/")return this.renderDashboard();
    if(h==="/batch")return this.renderBatch();
    let m=h.match(/^\/projects\/([^/]+)$/);
    if(m)return this.renderProject(decodeURIComponent(m[1]));
    m=h.match(/^\/projects\/([^/]+)\/episodes\/(\d+)$/);
    if(m)return this.renderEpisode(decodeURIComponent(m[1]),parseInt(m[2]));
    this.renderDashboard();
  },
  navigate(href){location.hash=href},

  $(s){return document.querySelector(s)},
  esc(s){const d=document.createElement("div");d.textContent=s;return d.innerHTML},

  async api(path,opts={}){
    const res=await fetch(path,{headers:{"Content-Type":"application/json"},...opts});
    if(!res.ok){const t=await res.text().catch(()=>"");throw Error(res.status+" "+res.statusText+(t?": "+t:""))}
    return opts._raw?res:res.json();
  },

  sc(s){return s==="assembled"?"assembled":s==="script_ready"?"script_ready":s==="images_ready"?"images_ready":s==="videos_ready"?"videos_ready":"pending"},
  sl(s){return{pending:"\u23F3 Pending",script_ready:"\uD83D\uDCDD Script",images_ready:"\uD83D\uDDBC Images",videos_ready:"\uD83C\uDFAC Videos",assembled:"\u2705 Done"}[s]||s},

  async renderDashboard(){
    this._stopPoll();
    const el=this.$("#app");
    let projects;
    try{projects=(await this.api("/api/projects")).projects}
    catch(e){el.innerHTML=`<div class="empty-state"><p style="color:var(--red)">${this.esc(e.message)}</p></div>`;return}
    let html=`<div class="page-title">Projects</div>
      <div class="page-sub">${projects.length} project(s) found</div>
      <div style="margin-bottom:16px"><button class="btn btn-primary" onclick="App.showNewProject()">+ New Project</button></div>`;
    if(projects.length===0)html+=`<div class="empty-state"><p>No projects found.</p><p class="text-sm text-muted">Create with <code>agnes-video project init</code>.</p></div>`;
    else{html+='<div class="project-grid">';
      for(const p of projects){
        const sm=p.status_summary||{};
        const badges=Object.entries(sm).map(([k,v])=>`<span class="stat-badge ${k}">${k}:${v}</span>`).join("")||'<span class="stat-badge">no episodes</span>';
        html+=`<div class="project-card" onclick="App.navigate('/projects/${encodeURIComponent(p.name)}')">
          <h3>${this.esc(p.name)}</h3>
          <div class="meta">${p.episode_count} ep(s) &middot; ${p.created_at||""}</div>
          <div class="stats">${badges}</div></div>`;
      }html+="</div>";}
    el.innerHTML=html;
  },

  bsc(s){return s==="completed"?"completed":s==="failed"?"failed":s==="running"?"running":s==="cancelled"?"cancelled":"pending"},
  bsl(s){return{pending:"\u23F3 Pending",running:"\u25B6 Running",completed:"\u2705 Done",failed:"\u274C Failed",cancelled:"\uD83D\uDEAB Cancelled"}[s]||s},

  async renderBatch(){
    this._stopPoll();
    const el=this.$("#app");el.innerHTML=`<div class="pulse text-muted" style="text-align:center;padding:60px">Loading...</div>`;
    let data;
    try{data=await this.api("/api/batch/jobs?limit=100")}
    catch(e){el.innerHTML=`<div class="empty-state"><p style="color:var(--red)">${e.message}</p></div>`;return}

    const jobs=data.jobs||[];
    const counts=data.counts||{};
    const summary=Object.entries(counts).map(([k,v])=>`<span class="stat-badge ${k}">${k}:${v}</span>`).join(" ");

    const rows=jobs.map(j=>{
      const ep=j.episode_num?` EP${j.episode_num}`:"";
      const err=j.error&&j.status==="failed"?`<div class="text-xs text-muted" style="max-width:300px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${this.esc(j.error)}">${this.esc(j.error.slice(0,80))}</div>`:"";
      return `<tr>
        <td><code style="font-size:.8em">${this.esc(j.id)}</code></td>
        <td><span class="stat-badge ${this.bsc(j.status)}">${this.bsl(j.status)}</span></td>
        <td>${this.esc(j.job_type)}${ep}${err}</td>
        <td>${this.esc(j.project||"—")}</td>
        <td class="text-muted text-sm">${(j.created_at||"").slice(0,19)}</td>
        <td>${j.status==="pending"||j.status==="running"?`<button class="btn btn-small btn-danger" onclick="App.cancelBatchJob('${this.esc(j.id)}')">Cancel</button>`:""}</td>
      </tr>`;
    }).join("")||'<tr><td colspan="6" style="text-align:center;color:var(--text3);padding:20px">No jobs.</td></tr>';

    el.innerHTML=`<div class="page-title">Batch Queue</div>
      <div class="page-sub">${summary||"No jobs"}</div>
      <div class="card"><table class="ep-table" style="width:100%">
        <thead><tr><th>ID</th><th>Status</th><th>Type</th><th>Project</th><th>Created</th><th></th></tr></thead>
        <tbody>${rows}</tbody>
      </table></div>
      <div class="text-sm text-muted" style="margin-top:8px">
        <span>Auto-refreshes every 5s. </span>
        <a href="#/batch" onclick="App.renderBatch();return false">Refresh now</a>
      </div>`;
    this._poller=setInterval(()=>{this.renderBatch()},5000);
  },

  async cancelBatchJob(jobId){
    try{
      const r=await this.api("/api/batch/cancel/"+encodeURIComponent(jobId),{method:"POST"});
      if(r.cancelled)this.renderBatch();
      else alert("Could not cancel — job may already be done.");
    }catch(e){alert("Cancel failed: "+e.message)}
  },

  showNewProject(){
    const o=document.createElement("div");o.className="modal-overlay";
    o.innerHTML=`<div class="modal"><h2>New Project</h2>
      <label>Name</label><input id="np-name" placeholder="my-drama">
      <label>Novel File (.txt)</label><input id="np-novel" placeholder="/path/to/novel.txt">
      <label>Style</label><input id="np-style" placeholder="cinematic, cyberpunk...">
      <div class="acts"><button class="btn btn-outline" onclick="this.closest('.modal-overlay').remove()">Cancel</button>
      <button class="btn btn-primary" onclick="App.createProject()">Create</button></div></div>`;
    document.body.appendChild(o);setTimeout(()=>document.getElementById("np-name")?.focus(),100);
  },

  async createProject(){
    const n=document.getElementById("np-name")?.value?.trim();if(!n)return alert("Name required");
    const novel=document.getElementById("np-novel")?.value?.trim()||"";
    const style=document.getElementById("np-style")?.value?.trim()||"";
    try{await this.api("/api/projects",{method:"POST",body:JSON.stringify({name:n,novel_path:novel,style})});
      document.querySelector(".modal-overlay")?.remove();this.navigate("/projects/"+encodeURIComponent(n))}
    catch(e){alert("Failed: "+e.message)}
  },

  async renderProject(name){
    this._stopPoll();
    const el=this.$("#app");el.innerHTML=`<div class="pulse text-muted" style="text-align:center;padding:60px">Loading...</div>`;
    let data;
    try{data=await this.api("/api/projects/"+encodeURIComponent(name))}
    catch(e){el.innerHTML=`<div class="empty-state"><p style="color:var(--red)">${e.message}</p><p class="text-sm mt-2"><a href="#/">Back</a></p></div>`;return}

    const epRows=data.episodes.map(e=>`<tr onclick="App.navigate('/projects/${encodeURIComponent(name)}/episodes/${e.number}')">
      <td><strong>EP${String(e.number).padStart(2,"0")}</strong></td>
      <td class="truncate" style="max-width:200px">${this.esc(e.title||"(untitled)")}</td>
      <td><span class="status-tag ${this.sc(e.status)}">${this.sl(e.status)}</span></td>
      <td class="text-muted text-sm">${e.output_path?"\u2713":"\u2014"}</td>
      <td class="text-xs">${e.output_path?`
        <span style="display:flex;gap:2px">
          <a href="#" onclick="event.stopPropagation();App.exportEpisode('${this.esc(name)}',${e.number},'9:16')" title="Export 9:16" style="color:var(--accent);text-decoration:none">v9</a>
          <a href="#" onclick="event.stopPropagation();App.exportEpisode('${this.esc(name)}',${e.number},'1:1')" title="Export 1:1" style="color:var(--accent);text-decoration:none">sq</a>
        </span>`:"\u2014"}</td></tr>`).join("")||'<tr><td colspan="5" style="text-align:center;color:var(--text3);padding:20px">No episodes</td></tr>';

    const charItems=(data.characters||[]).map(c=>{
      const _n=this.esc(c.name);
      return `<details class="char-sheet" style="border:1px solid var(--border);border-radius:6px;margin-bottom:6px;padding:6px 8px">
        <summary style="cursor:pointer;font-weight:600;font-size:.9em">${_n} <span class="text-muted text-xs">${this.esc(c.role||"")}</span></summary>
        <div class="char-fields" style="margin-top:6px;display:flex;flex-direction:column;gap:4px">
          <label class="text-xs text-muted">Role</label>
          <input class="cs-${_n}-role" type="text" value="${this.esc(c.role||"")}" style="width:100%;background:var(--surface3);border:1px solid var(--border);color:var(--text);border-radius:3px;padding:2px 6px;font-size:.85em">
          <label class="text-xs text-muted">Age</label>
          <input class="cs-${_n}-age" type="text" value="${this.esc(c.age||"")}" style="width:100%;background:var(--surface3);border:1px solid var(--border);color:var(--text);border-radius:3px;padding:2px 6px;font-size:.85em">
          <label class="text-xs text-muted">Voice (TTS)</label>
          <input class="cs-${_n}-voice" type="text" value="${this.esc(c.voice||"")}" placeholder="zh-CN-XiaoxiaoNeural" style="width:100%;background:var(--surface3);border:1px solid var(--border);color:var(--text);border-radius:3px;padding:2px 6px;font-size:.85em">
          <label class="text-xs text-muted">Personality</label>
          <textarea class="cs-${_n}-personality" rows="2" style="width:100%;background:var(--surface3);border:1px solid var(--border);color:var(--text);border-radius:3px;padding:2px 6px;font-size:.85em;resize:vertical">${this.esc(c.personality||"")}</textarea>
          <label class="text-xs text-muted">Appearance</label>
          <textarea class="cs-${_n}-appearance" rows="2" style="width:100%;background:var(--surface3);border:1px solid var(--border);color:var(--text2);border-radius:3px;padding:2px 6px;font-size:.8em;resize:vertical">${this.esc(c.appearance||"")}</textarea>
          <label class="text-xs text-muted">Sample Dialogue</label>
          <textarea class="cs-${_n}-dialogue" rows="2" style="width:100%;background:var(--surface3);border:1px solid var(--border);color:var(--text2);border-radius:3px;padding:2px 6px;font-size:.8em;resize:vertical">${this.esc(c.sample_dialogue||"")}</textarea>
          <label class="text-xs text-muted">Backstory</label>
          <textarea class="cs-${_n}-backstory" rows="2" style="width:100%;background:var(--surface3);border:1px solid var(--border);color:var(--text2);border-radius:3px;padding:2px 6px;font-size:.8em;resize:vertical">${this.esc(c.backstory||"")}</textarea>
          ${c.portrait_url?`<div style="margin-top:4px"><img src="${this.esc(c.portrait_url)}" alt="${_n}" style="width:60px;height:60px;object-fit:cover;border-radius:4px;border:1px solid var(--border)"></div>`:""}
        </div>
      </details>`;
    }).join("")||'<div class="empty">No characters</div>';

    const rl=data.is_running?"pulse":"";
    el.innerHTML=`<div class="project-header"><div class="back"><a href="#/" title="Back">\u2190</a></div>
      <div class="info"><h1>${this.esc(data.name)}</h1>
      <div class="meta">${data.episodes.length} ep(s) &middot; ${data.video_mode||"image-to-video"}${data.has_novel?" &middot; novel loaded":""}</div></div></div>
      <div class="two-col"><div class="main">
        <div class="card"><h2>Episodes</h2><table class="ep-table"><thead><tr><th style="width:60px">#</th><th>Title</th><th style="width:100px">Status</th><th style="width:50px">Vid</th><th style="width:60px">Exp</th></tr></thead><tbody>${epRows}</tbody></table></div>
        <div class="card"><h2>Storyboard</h2>${data.episodes.filter(e=>e.status!=="pending").map(e=>{
          const show=e.status==="script_ready"||e.status==="images_ready"||e.status==="videos_ready"||e.status==="assembled";
          return `<div class="mb-2"><a href="#/projects/${encodeURIComponent(name)}/episodes/${e.number}">EP${String(e.number).padStart(2,"0")} ${this.esc(e.title||"")}</a>${show?` <span style="float:right"><a href="/api/projects/${encodeURIComponent(name)}/storyboard/${e.number}" target="_blank" class="text-sm">View \u2192</a></span>`:""}</div>`
        }).join("")||'<div class="empty">Analyze first.</div>'}</div>
      </div><div class="side">
        <div class="card"><h2>Controls</h2><div class="controls">
          <button class="btn btn-primary ${rl}" id="btn-analyze" onclick="App.runAnalyze('${this.esc(name)}')" ${data.is_running?"disabled":""}>Analyze</button>
          <button class="btn btn-primary ${rl}" id="btn-render-all" onclick="App.runRenderAll('${this.esc(name)}')" ${data.is_running?"disabled":""}>Render All</button>
          <button class="btn btn-outline ${rl}" id="btn-check" onclick="App.runCheck('${this.esc(name)}')" ${data.is_running?"disabled":""}>Check Plot</button></div>
          <div class="text-sm text-muted" style="margin-top:8px;border-top:1px solid var(--border);padding-top:8px">
            <span style="font-weight:600">Batch Queue:</span>
            <button class="btn btn-small btn-outline" onclick="App.batchSubmit('${this.esc(name)}','analyze')" style="margin-left:6px">Analyze</button>
            <button class="btn btn-small btn-outline" onclick="App.batchSubmit('${this.esc(name)}','render_all')">Render All</button>
            <button class="btn btn-small btn-outline" onclick="App.batchSubmit('${this.esc(name)}','check',0)">Check All</button>
          </div>
          <div id="check-results" class="text-sm mt-2"></div></div>
        <div class="card"><h2>Characters (${(data.characters||[]).length})</h2><div class="char-list">${charItems}</div><div class="mt-2" style="display:flex;align-items:center;gap:8px"><button class="btn btn-small btn-primary" onclick="App.saveCharacterSheets('${this.esc(name)}')">Save All</button><span id="char-feedback" class="text-sm"></span></div></div>
        <div class="card"><h2>Info</h2><div class="text-sm" style="line-height:1.8">
          <div><span class="text-muted">Root:</span> ${this.esc(data.root)}</div>
          <div><span class="text-muted">Novel:</span> ${data.has_novel?"\u2713":"\u2014"}</div>
          <div><span class="text-muted">Parallel:</span> ${data.parallel?"\u2713":"\u2014"}</div>
          <div><span class="text-muted">Storyboard:</span> ${data.preview_storyboard?"\u2713":"\u2014"}</div></div></div>
        <div class="card"><h2>Log</h2><div class="log-viewer" id="log-viewer"></div></div>
      </div></div>`;
  },

  async runAnalyze(name){
    const b1=document.getElementById("btn-analyze"),b2=document.getElementById("btn-render-all");
    if(b1)b1.disabled=true;if(b2)b2.disabled=true;
    try{await this.api("/api/projects/"+encodeURIComponent(name)+"/analyze",{method:"POST"});
      this._attachLog(name);this._pollProject(name)}
    catch(e){alert("Failed: "+e.message);if(b1)b1.disabled=false;if(b2)b2.disabled=false}
  },

  async runRenderAll(name){
    const b1=document.getElementById("btn-analyze"),b2=document.getElementById("btn-render-all");
    if(b1)b1.disabled=true;if(b2)b2.disabled=true;
    try{await this.api("/api/projects/"+encodeURIComponent(name)+"/render",{method:"POST",body:JSON.stringify({episode:0})});
      this._attachLog(name);this._pollProject(name)}
    catch(e){alert("Failed: "+e.message);if(b1)b1.disabled=false;if(b2)b2.disabled=false}
  },

  async runRenderEpisode(name,ep){
    const b=document.getElementById("btn-render-ep"+ep);if(b)b.disabled=true;
    try{await this.api("/api/projects/"+encodeURIComponent(name)+"/render",{method:"POST",body:JSON.stringify({episode:ep})});
      this._pollEpisode(name,ep)}
    catch(e){alert("Failed: "+e.message);if(b)b.disabled=false}
  },

  async runCheck(name){
    const cr=document.getElementById("check-results");if(!cr)return;
    cr.innerHTML='<span class="pulse text-muted">Checking...</span>';
    const ep=document.querySelector(".ep-table tbody tr td strong");
    if(!ep){cr.innerHTML='<span class="text-muted">No episode selected.</span>';return}
    const num=parseInt(ep.textContent.replace("EP",""));
    try{
      const d=await this.api("/api/projects/"+encodeURIComponent(name)+"/check/"+num);
      let html="";
      if(d.critical===0&&d.warnings===0){html='<span style="color:var(--accent)">\u2713 No issues found</span>';}
      else{
        html=`<div style="color:${d.critical>0?'var(--red)':'var(--yellow)'}">\u26A0 ${d.critical} critical, ${d.warnings} warning(s)</div>`;
        for(const issue of d.issues){
          html+=`<div style="padding:4px 0;border-bottom:1px solid var(--border)">
            <span style="color:${issue.severity==='critical'?'var(--red)':'var(--yellow)'}">[${issue.severity}]</span>
            <span>${this.esc(issue.description)}</span>
            <div class="text-muted" style="font-size:.9em;padding-left:12px">${this.esc(issue.suggestion||"")}</div></div>`;
        }
      }
      cr.innerHTML=html;
    }catch(e){cr.innerHTML='<span style="color:var(--red)">Check failed: '+this.esc(e.message)+'</span>'}
  },

  async saveScene(name,ep,sceneId){
    const el=document.getElementById("scene-edit-"+sceneId);
    if(!el)return;
    const narration=el.querySelector(".edit-narration")?.value;
    const visual_prompt=el.querySelector(".edit-prompt")?.value;
    const duration=parseFloat(el.querySelector(".edit-duration")?.value);
    const body={};
    if(narration!==undefined)body.narration=narration;
    if(visual_prompt!==undefined)body.visual_prompt=visual_prompt;
    if(!isNaN(duration))body.duration_seconds=duration;
    try{
      await this.api("/api/projects/"+encodeURIComponent(name)+"/episodes/"+ep+"/scene/"+sceneId,
        {method:"PUT",body:JSON.stringify(body)});
      const fb=el.querySelector(".save-feedback");
      if(fb){fb.textContent="\u2713 Saved";fb.style.color="var(--accent)";setTimeout(()=>fb.textContent="",2000)}
    }catch(e){alert("Save failed: "+e.message)}
  },

  async reorderScenes(name,ep,draggedId,targetId){
    if(draggedId===targetId)return;
    try{
      await this.api("/api/projects/"+encodeURIComponent(name)+"/episodes/"+ep+"/reorder",
        {method:"PUT",body:JSON.stringify({dragged_id:draggedId,target_id:targetId})});
      this.loadEpisode(name,ep);
    }catch(e){alert("Reorder failed: "+e.message)}
  },

  async toggleSceneLock(name,ep,sceneId){
    const el=document.getElementById("scene-edit-"+sceneId);
    if(!el)return;
    const currentlyLocked=el.dataset.locked==="true";
    try{
      await this.api("/api/projects/"+encodeURIComponent(name)+"/episodes/"+ep+"/scene/"+sceneId,
        {method:"PUT",body:JSON.stringify({locked:!currentlyLocked})});
      el.dataset.locked=(!currentlyLocked).toString();
      el.style.borderColor=!currentlyLocked?"var(--accent)":"var(--border)";
      const btn=el.querySelector(".lock-btn");
      if(btn)btn.textContent=!currentlyLocked?"\uD83D\uDD12":"\uD83D\uDD13";
    }catch(e){alert("Lock toggle failed: "+e.message)}
  },

  async trimScene(name,ep,sceneId){
    const el=document.getElementById("scene-edit-"+sceneId);
    if(!el)return;
    const trimIn=parseFloat(el.querySelector(".trim-in-"+sceneId)?.value)||0;
    const trimOut=parseFloat(el.querySelector(".trim-out-"+sceneId)?.value)||0;
    try{
      await this.api("/api/projects/"+encodeURIComponent(name)+"/episodes/"+ep+"/scene/"+sceneId+"/trim",
        {method:"PUT",body:JSON.stringify({trim_in:trimIn,trim_out:trimOut})});
      const fb=el.querySelector(".save-feedback");
      if(fb){fb.textContent="\u2713 Trimmed";fb.style.color="var(--accent)";setTimeout(()=>fb.textContent="",2000)}
    }catch(e){alert("Trim failed: "+e.message)}
  },

  async saveCharacterSheets(name){
    const chars=[];
    document.querySelectorAll(".char-sheet").forEach(el=>{
      const n=el.querySelector("summary")?.textContent?.trim()?.split(/\s/)[0];
      if(!n)return;
      const g=cn=>document.querySelector(".cs-"+n+"-"+cn)?.value??"";
      chars.push({
        name:n,role:g("role"),age:g("age"),voice:g("voice"),
        personality:g("personality"),appearance:g("appearance"),
        sample_dialogue:g("dialogue"),backstory:g("backstory")
      });
    });
    if(chars.length===0)return;
    try{
      await this.api("/api/projects/"+encodeURIComponent(name)+"/characters",
        {method:"PUT",body:JSON.stringify({characters:chars})});
      const fb=document.getElementById("char-feedback");
      if(fb){fb.textContent="\u2713 Saved";fb.style.color="var(--accent)";setTimeout(()=>fb.textContent="",2000)}
    }catch(e){alert("Character save failed: "+e.message)}
  },

  async batchSubmit(project,jobType,episode=0){
    try{
      await this.api("/api/batch/submit",{method:"POST",body:JSON.stringify({job_type:jobType,project,episode})});
      if(confirm("Job submitted to batch queue. View queue?"))this.navigate("/batch");
    }catch(e){alert("Submit failed: "+e.message)}
  },

  async exportEpisode(name,ep,aspect){
    const fb=document.getElementById("export-feedback-"+ep);
    if(fb)fb.textContent="Cropping to "+aspect+"...";
    try{
      const r=await this.api("/api/projects/"+encodeURIComponent(name)+"/episodes/"+ep+"/export",
        {method:"POST",body:JSON.stringify({aspect})});
      if(fb)fb.innerHTML='\u2713 <a href="'+r.url+'" target="_blank" style="color:var(--accent)">'+aspect+'</a>';
    }catch(e){
      if(fb)fb.innerHTML='<span style="color:var(--red)">Failed: '+this.esc(e.message)+'</span>';
    }
  },

  _attachLog(name){
    const lv=document.getElementById("log-viewer");if(!lv)return;
    lv.textContent="";lv.classList.add("cursor");
    const es=new EventSource("/api/logs/"+encodeURIComponent(name));
    es.onmessage=(e)=>{
      const d=JSON.parse(e.data);
      if(d.done){es.close();lv.classList.remove("cursor");return}
      lv.textContent+=d.text+"\n";lv.scrollTop=lv.scrollHeight;
    };
    es.onerror=()=>{};
  },

  _pollProject(name){
    this._stopPoll();
    this._poller=setInterval(async()=>{
      try{const d=await this.api("/api/projects/"+encodeURIComponent(name));
        if(!d.is_running){this._stopPoll();this.renderProject(name);return}}
      catch(e){}
    },2000);
  },

  _pollEpisode(name,ep){
    this._stopPoll();
    this._poller=setInterval(async()=>{
      try{const d=await this.api("/api/projects/"+encodeURIComponent(name)+"/episodes/"+ep);
        if(!d.is_running){this._stopPoll();this.renderEpisode(name,ep);return}}
      catch(e){}
    },2000);
  },

  _stopPoll(){if(this._poller){clearInterval(this._poller);this._poller=null}},

  async renderEpisode(name,ep){
    this._stopPoll();
    const el=this.$("#app");el.innerHTML=`<div class="pulse text-muted" style="text-align:center;padding:60px">Loading episode...</div>`;
    let data;
    try{data=await this.api("/api/projects/"+encodeURIComponent(name)+"/episodes/"+ep)}
    catch(e){el.innerHTML=`<div class="empty-state"><p style="color:var(--red)">${e.message}</p><p class="text-sm mt-2"><a href="#/projects/${encodeURIComponent(name)}">Back</a></p></div>`;return}

    const sc=data.script;
    const scenes=sc?.scenes||[];
    const rl=data.is_running?"pulse":"";

    const sceneCards=scenes.map(s=>{
      const imgSrc=s.image_rel?"/api/projects/"+encodeURIComponent(name)+"/images/"+s.image_rel:"";
      const vidSrc=s.video_rel?"/api/projects/"+encodeURIComponent(name)+"/videos/"+s.video_rel:"";
      const dials=(s.dialogues||[]).map(d=>`<div class="dial"><span class="cn">${this.esc(d.character||"")}</span>: ${this.esc(d.line||"")}</div>`).join("");
      const tags=(s.character_appearances||[]).map(c=>`<span class="tag">${this.esc(c)}</span>`).join("");
      return `<div class="scene-card" id="scene-edit-${s.id}" draggable="true" data-locked="${s.locked}" style="${s.locked?'border-color:var(--accent)':''}"
          ondragstart="event.dataTransfer.setData('text/plain','${s.id}');this.classList.add('dragging')"
          ondragend="this.classList.remove('dragging')"
          ondragover="event.preventDefault();this.parentNode.querySelectorAll('.scene-card').forEach(c=>c.classList.remove('drag-over'));this.classList.add('drag-over')"
          ondragleave="this.classList.remove('drag-over')"
          ondrop="event.preventDefault();App.reorderScenes('${this.esc(name)}',${ep},parseInt(event.dataTransfer.getData('text/plain')),${s.id})"><div class="img-wrap">${
        vidSrc?`<video src="${vidSrc}" controls preload="metadata" style="width:100%;height:100%;object-fit:contain"></video>`
        :imgSrc?`<img src="${imgSrc}" alt="Scene ${s.id}" loading="lazy">`
        :`<div class="ph">(no image)</div>`
      }</div><div class="body">
        <div class="num">Scene ${s.id}</div>
        <div class="meta"><span class="badge"><input class="edit-duration" type="number" step="0.5" min="1" max="60" value="${s.duration_seconds.toFixed(1)}" style="width:50px;background:var(--surface3);border:1px solid var(--border);color:var(--text);border-radius:3px;padding:1px 4px;font-size:.85em">s</span><span class="badge cam">${this.esc(s.camera||"static")}</span><span class="badge">${this.esc(s.style||"")}</span></div>
        <div class="narr"><textarea class="edit-narration" rows="2" style="width:100%;background:var(--surface3);border:1px solid var(--border);color:var(--text);border-radius:4px;padding:4px;font-size:.85em;font-family:var(--font);resize:vertical">${this.esc(s.narration||"")}</textarea></div>
        <div style="margin-top:4px"><textarea class="edit-prompt" rows="2" style="width:100%;background:var(--surface3);border:1px solid var(--border);color:var(--text2);border-radius:4px;padding:4px;font-size:.8em;font-family:var(--mono);resize:vertical">${this.esc(s.visual_prompt||"")}</textarea></div>
        ${dials}${tags?`<div class="tags">${tags}</div>`:""}
        <div class="si" style="display:flex;align-items:center;flex-wrap:wrap;gap:4px;margin-top:6px">
          <span><span class="d ${s.is_image_ready?"ok":"no"}"></span>img <span class="d ${s.is_video_ready?"ok":"no"}"></span>vid</span>
          <span class="text-xs text-muted" style="margin-left:auto">Trim:
            <input class="trim-in-${s.id}" type="number" step="0.1" min="0" max="30" value="${(s.trim_in||0).toFixed(1)}" title="Trim from start (seconds)" style="width:36px;background:var(--surface3);border:1px solid var(--border);color:var(--text);border-radius:3px;padding:1px 3px;font-size:.8em">in
            <input class="trim-out-${s.id}" type="number" step="0.1" min="0" max="30" value="${(s.trim_out||0).toFixed(1)}" title="Trim from end (seconds)" style="width:36px;background:var(--surface3);border:1px solid var(--border);color:var(--text);border-radius:3px;padding:1px 3px;font-size:.8em">out
            <button class="btn-trim-${s.id}" onclick="App.trimScene('${this.esc(name)}',${ep},${s.id})" style="background:none;border:1px solid var(--border);color:var(--text2);border-radius:3px;cursor:pointer;padding:1px 6px;font-size:.75em">Trim</button>
          </span>
          <span><button class="lock-btn" onclick="App.toggleSceneLock('${this.esc(name)}',${ep},${s.id})" style="background:none;border:1px solid var(--border);color:var(--text2);border-radius:3px;cursor:pointer;padding:1px 6px;font-size:.85em">${s.locked?"🔒":"🔓"}</button> <button class="btn btn-small btn-primary" onclick="App.saveScene('${this.esc(name)}',${ep},${s.id})" style="padding:2px 8px;font-size:.75em">Save</button><span class="save-feedback text-sm" style="margin-left:6px"></span></span>
        </div>
      </div></div>`;
    }).join("")||'<div class="empty" style="text-align:center;padding:40px;color:var(--text3)">No scenes in this episode.</div>';

    el.innerHTML=`<div class="project-header"><div class="back"><a href="#/projects/${encodeURIComponent(name)}" title="Back">\u2190</a></div>
      <div class="info"><h1>EP${String(ep).padStart(2,"0")} ${this.esc(data.title||"")}</h1>
      <div class="meta"><span class="status-tag ${this.sc(data.status)}">${this.sl(data.status)}</span>
      ${sc?`&middot; ${scenes.length} scene(s) &middot; ${(sc.total_duration||0).toFixed(0)}s`:""}
      ${sc?.style_guide?" &middot; "+this.esc(sc.style_guide):""}</div></div></div>

      <div class="two-col"><div class="main">
        <div class="card"><h2>Scenes</h2><div class="scene-grid">${sceneCards}</div></div>
        ${data.output_path?`<div class="card"><h2>Output</h2><div class="text-sm"><a href="/${data.output_path}" target="_blank">${this.esc(data.output_path)}</a></div></div>`:""}
      </div>      <div class="side">
        <div class="card"><h2>Controls</h2><div class="controls">
          <button class="btn btn-primary ${rl}" id="btn-render-ep${ep}" onclick="App.runRenderEpisode('${this.esc(name)}',${ep})" ${data.is_running?"disabled":""}>Render Episode</button>
          ${data.status==="script_ready"||data.status==="images_ready"||data.status==="videos_ready"||data.status==="assembled"?`<a class="btn btn-outline" href="/api/projects/${encodeURIComponent(name)}/storyboard/${ep}" target="_blank">Storyboard</a>`:""}
          <button class="btn btn-small btn-outline" onclick="App.batchSubmit('${this.esc(name)}','render_episode',${ep})" style="font-size:.75em">Queue</button>
          <button class="btn btn-small btn-outline" onclick="App.batchSubmit('${this.esc(name)}','check',${ep})" style="font-size:.75em">Check</button>
          ${data.output_path?`<div style="margin-top:8px;border-top:1px solid var(--border);padding-top:8px">
            <span style="font-weight:600;font-size:.85em">Export</span>
            <div style="display:flex;gap:4px;margin-top:4px">
              <button class="btn btn-small btn-outline" onclick="App.exportEpisode('${this.esc(name)}',${ep},'9:16')">9:16</button>
              <button class="btn btn-small btn-outline" onclick="App.exportEpisode('${this.esc(name)}',${ep},'1:1')">1:1</button>
              <button class="btn btn-small btn-outline" onclick="App.exportEpisode('${this.esc(name)}',${ep},'4:3')">4:3</button>
            </div>
            <div id="export-feedback-${ep}" class="text-xs text-muted" style="margin-top:4px"></div>
          </div>`:""}
        </div></div>
        <div class="card"><h2>Cost Estimate</h2><div id="cost-estimate" class="text-sm"><span class="pulse text-muted">Loading...</span></div></div>
        <div class="card"><h2>Log</h2><div class="log-viewer" id="log-viewer"></div></div>
      </div></div>`;
    // Load cost estimate
    (async()=>{
      try{
        const r=await this.api("/api/projects/"+encodeURIComponent(name)+"/estimate/"+ep);
        const ce=document.getElementById("cost-estimate");
        if(!ce)return;
        ce.innerHTML='<span style="color:var(--text2)">\$'+(r.total_cost||"0").toFixed(2)+'</span> <span class="text-muted text-xs">estimated</span><br>'
          +'<span class="text-xs text-muted">'+r.scene_count+' scene(s) &middot; ~'+(r.total_time_seconds?Math.round(r.total_time_seconds/60)+' min':"<1 min")+'</span>';
      }catch(e){}
    })();
  },
};
App.init();
</script>
</body>
</html>
